<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>联系我 · 微信</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0 }
  body {
    font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    background: #f6f5f3;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px 16px 48px;
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    background:#fff; width:100%; max-width:420px;
    border-radius:20px; padding:28px 20px 32px;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
    text-align:center;
  }
  h2{ font-size:20px; color:#222; margin-bottom:6px }
  .sub{ font-size:13px; color:#888; margin-bottom:18px }

  /* 二维码区域 */
  .qr-wrap{
    margin:0 auto 18px;
    width:min(260px,70vw); aspect-ratio:1/1;
    border-radius:16px; overflow:hidden;
    background:#fafafa; border:1px solid #eee;
    display:flex; align-items:center; justify-content:center;
  }
  .qr-wrap img{ width:100%; height:100%; object-fit:contain }

  .tip{ font-size:13px; color:#666; line-height:1.6; margin-bottom:16px }

  /* 微信号 + 复制 */
  .wx-row{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:18px; flex-wrap:wrap;
  }
  .wx-id{
    background:#f3f3f3; border-radius:10px; padding:8px 14px;
    font-size:15px; color:#222; letter-spacing:.4px;
    user-select:all; word-break:break-all;
  }
  .copy-btn{
    appearance:none; border:none; cursor:pointer;
    background:#07c160; color:#fff; font-size:14px;
    padding:8px 14px; border-radius:10px; font-weight:600;
    transition:opacity .2s;
  }
  .copy-btn:active{ opacity:.85 }

  /* 保存图片备用方案 */
  .save-tip{ font-size:12px; color:#aaa; margin-top:6px }

  /* toast */
  #toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.72); color:#fff; padding:8px 18px; border-radius:999px;
    font-size:13px; opacity:0; pointer-events:none;
    transition:opacity .25s;
  }
  #toast.show{ opacity:1 }
</style>
</head>
<body>

<div class="card">
  <h2>📩 加低语师兄绿泡泡</h2>
  <div class="sub">长按识别二维码 · 或复制微信号搜索添加</div>

  <!-- 二维码：把 qrcode.jpg 放到同一文件夹 -->
  <div class="qr-wrap">
    <img src="diyu.jpg" alt="微信二维码"
         onerror="this.style.display='none';document.getElementById('qrErr').style.display='block'"/>
    <div id="qrErr" style="display:none;color:#c00;font-size:13px;padding:12px">
      二维码加载失败<br><small>请检查 qrcode.jpg 是否存在</small>
    </div>
  </div>

  <div class="tip">
    打开微信 → ＋ →【扫一扫 / 添加朋友】<br>也可复制下方微信号搜索
  </div>

  <div class="wx-row">
    <div class="wx-id" id="wxid">18507902183</div>
    <button class="copy-btn" onclick="copyWx()">复制</button>
  </div>

  <div class="save-tip">如二维码不识别，可截图保存后到微信相册选择扫码</div>
</div>

<div id="toast"></div>

<script>
function copyWx(){
  var text = document.getElementById('wxid').innerText.trim();
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
  } else fallbackCopy();
  function fallbackCopy(){
    var ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); showToast(); }catch(e){}
    document.body.removeChild(ta);
  }
  function showToast(){ var t=document.getElementById('toast'); t.textContent='✅ 已复制：'+text; t.classList.add('show'); setTimeout(function(){t.classList.remove('show')},1500) }
}
</script>
</body>
</html>
